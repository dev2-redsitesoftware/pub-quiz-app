<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pub Quiz App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="quiz-header">
    <h1 class="quiz-title">🍺 Pub Quiz</h1>
    <span id="score-display" class="score-display">Score: 0</span>
  </header>

  <main class="quiz-container">
    <div id="question-card" class="question-card">
      <p id="question-number" class="question-number"></p>
      <p id="question-text" class="question-text"></p>
      <div id="options-grid" class="options-grid">
        <button class="option-btn"></button>
        <button class="option-btn"></button>
        <button class="option-btn"></button>
        <button class="option-btn"></button>
      </div>
      <button id="next-btn" class="next-btn hidden">Next Question →</button>
    </div>

    <section id="results" class="results hidden">
      <h2 class="results-title">Quiz Complete!</h2>
      <p class="score-summary">Your final score: <strong id="final-score"></strong></p>
      <ul id="review-list" class="review-list"></ul>
      <button id="play-again-btn" class="play-again-btn">Play Again</button>
    </section>
  </main>

  <script src="questions.js"></script>
  <script src="quiz.js"></script>
</body>
</html>
